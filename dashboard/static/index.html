<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telescope — Outgoing Requests</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", Menlo, monospace;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.04em;
    }

    .logo svg { flex-shrink: 0; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-count {
      background: #312e81;
      color: #c4b5fd;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      transition: background 0.3s;
    }
    #status-dot.stale { background: #f59e0b; }

    button.clear-btn {
      background: #1e293b;
      color: #f87171;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button.clear-btn:hover { background: #2d1a1a; border-color: #f87171; }

    main { display: flex; height: calc(100vh - 57px); overflow: hidden; }

    .table-panel {
      flex: 1;
      overflow-y: auto;
      border-right: 1px solid #2d3748;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #161b27;
      color: #94a3b8;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid #2d3748;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #1a2235; }
    tbody tr.selected { background: #1e2d4a !important; }

    td {
      padding: 9px 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 360px;
      vertical-align: middle;
    }

    .method-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .method-GET    { background: #052e16; color: #4ade80; }
    .method-POST   { background: #1c1917; color: #fb923c; }
    .method-PUT    { background: #1e1b4b; color: #818cf8; }
    .method-PATCH  { background: #1c1917; color: #facc15; }
    .method-DELETE { background: #2d0a0a; color: #f87171; }
    .method-HEAD   { background: #0c1a2e; color: #7dd3fc; }
    .method-OTHER  { background: #1e293b; color: #94a3b8; }

    .status-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-1xx { background: #1e293b; color: #94a3b8; }
    .status-2xx { background: #052e16; color: #4ade80; }
    .status-3xx { background: #1c1917; color: #fb923c; }
    .status-4xx { background: #2d0a0a; color: #f87171; }
    .status-5xx { background: #2d1a1a; color: #f87171; }
    .status-neg { background: #2d2a0a; color: #facc15; }

    .dur { color: #94a3b8; }
    .dur.slow { color: #f87171; }
    .dur.medium { color: #fb923c; }

    .ts { color: #64748b; font-size: 11px; }

    .url-cell { color: #bae6fd; }

    /* Detail panel */
    .detail-panel {
      width: 480px;
      min-width: 280px;
      overflow-y: auto;
      background: #0d1321;
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
    }
    .detail-panel.hidden { width: 0; min-width: 0; overflow: hidden; }

    .detail-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .detail-title { font-size: 13px; font-weight: 700; color: #a78bfa; }
    .close-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
    }
    .close-btn:hover { color: #e2e8f0; }

    .detail-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }

    .detail-row { display: flex; flex-direction: column; gap: 3px; }
    .detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .detail-value { font-size: 13px; color: #e2e8f0; word-break: break-all; }

    .detail-body-text {
      background: #161b27;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #a5b4fc;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 320px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 20px;
      color: #475569;
      font-size: 14px;
    }
    .empty-state svg { opacity: 0.4; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Telescope
  </div>
  <div class="header-right">
    <span id="status-dot" title="Live"></span>
    <span class="badge-count" id="count-badge">0 requests</span>
    <button class="clear-btn" id="clear-btn">Clear</button>
  </div>
</header>
<main>
  <div class="table-panel" id="table-panel">
    <table id="requests-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Method</th>
          <th>URL</th>
          <th>Status</th>
          <th>Duration</th>
        </tr>
      </thead>
      <tbody id="requests-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      No outgoing requests captured yet.
    </div>
  </div>
  <div class="detail-panel hidden" id="detail-panel">
    <div class="detail-header">
      <span class="detail-title">Request Detail</span>
      <button class="close-btn" id="close-detail" title="Close">&#x2715;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</main>

<script>
  const API = '/telescope/api/requests';
  let entries = [];
  let selectedId = null;
  let lastFetch = 0;

  const tbody = document.getElementById('requests-body');
  const detailPanel = document.getElementById('detail-panel');
  const detailBody = document.getElementById('detail-body');
  const countBadge = document.getElementById('count-badge');
  const statusDot = document.getElementById('status-dot');
  const emptyState = document.getElementById('empty-state');

  function methodClass(m) {
    const k = (m || '').toUpperCase();
    const map = { GET:'GET', POST:'POST', PUT:'PUT', PATCH:'PATCH', DELETE:'DELETE', HEAD:'HEAD' };
    return map[k] || 'OTHER';
  }

  function statusClass(code) {
    if (code < 0) return 'status-neg';
    if (code < 200) return 'status-1xx';
    if (code < 300) return 'status-2xx';
    if (code < 400) return 'status-3xx';
    if (code < 500) return 'status-4xx';
    return 'status-5xx';
  }

  function durClass(ms) {
    if (ms > 2000) return 'slow';
    if (ms > 500) return 'medium';
    return '';
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${String(d.getMilliseconds()).padStart(3,'0')}`;
  }

  function fmtBody(body) {
    if (!body) return '(empty)';
    try {
      return JSON.stringify(JSON.parse(body), null, 2);
    } catch (_) {
      return body;
    }
  }

  function renderTable() {
    const frag = document.createDocumentFragment();

    entries.forEach(e => {
      const tr = document.createElement('tr');
      tr.dataset.id = e.id;
      if (e.id === selectedId) tr.classList.add('selected');

      tr.innerHTML = `
        <td class="ts">${fmtTime(e.timestamp)}</td>
        <td><span class="method-badge method-${methodClass(e.method)}">${e.method || '?'}</span></td>
        <td class="url-cell" title="${e.url}">${e.url}</td>
        <td><span class="status-badge ${statusClass(e.status_code)}">${e.status_code < 0 ? 'ERR' : e.status_code}</span></td>
        <td class="dur ${durClass(e.duration_ms)}">${e.duration_ms} ms</td>
      `;

      tr.addEventListener('click', () => selectEntry(e.id));
      frag.appendChild(tr);
    });

    tbody.innerHTML = '';
    tbody.appendChild(frag);

    const total = entries.length;
    countBadge.textContent = `${total} request${total !== 1 ? 's' : ''}`;
    emptyState.style.display = total === 0 ? 'flex' : 'none';
    document.getElementById('requests-table').style.display = total === 0 ? 'none' : '';
  }

  function selectEntry(id) {
    selectedId = id;
    const e = entries.find(x => x.id === id);
    renderTable();

    if (!e) { closeDetail(); return; }

    detailPanel.classList.remove('hidden');
    detailBody.innerHTML = `
      <div class="detail-row">
        <span class="detail-label">ID</span>
        <span class="detail-value">${e.id}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Timestamp</span>
        <span class="detail-value">${new Date(e.timestamp).toISOString()}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Method</span>
        <span class="detail-value"><span class="method-badge method-${methodClass(e.method)}">${e.method}</span></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">URL</span>
        <span class="detail-value">${e.url}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value"><span class="status-badge ${statusClass(e.status_code)}">${e.status_code < 0 ? 'Error' : e.status_code}</span></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Duration</span>
        <span class="detail-value dur ${durClass(e.duration_ms)}">${e.duration_ms} ms</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Request Body</span>
        <pre class="detail-body-text">${escHtml(fmtBody(e.body))}</pre>
      </div>
    `;
  }

  function closeDetail() {
    selectedId = null;
    detailPanel.classList.add('hidden');
    renderTable();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function fetchEntries() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(res.status);
      entries = await res.json();
      lastFetch = Date.now();
      statusDot.classList.remove('stale');
      renderTable();
      if (selectedId && !entries.find(e => e.id === selectedId)) {
        closeDetail();
      }
    } catch (err) {
      if (Date.now() - lastFetch > 6000) statusDot.classList.add('stale');
    }
  }

  document.getElementById('clear-btn').addEventListener('click', async () => {
    await fetch(API, { method: 'DELETE' });
    entries = [];
    closeDetail();
    renderTable();
  });

  document.getElementById('close-detail').addEventListener('click', closeDetail);

  fetchEntries();
  setInterval(fetchEntries, 2000);
</script>
</body>
</html>
